<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7">
<title>ticacode · reproduce</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap');
:root{
  --ku:#b43214;--ku2:#d4461a;--gold:#d4a853;--blue:#5b9bd5;
  --bg:#050506;--t1:#f5f5f7;--t2:#98989d;--t3:#636366;
  --line:rgba(255,255,255,.1);--err:#ff3b30;--ok:#34c759;
  --font:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --spring:cubic-bezier(.32,.72,0,1);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --brand-grad:linear-gradient(115deg,#fff5eb 0%,#f0a070 22%,#e07040 48%,#e0b060 76%,#f0d090 100%);
  --panel:rgba(18,14,16,.62);--panel-border:rgba(255,255,255,.12);
}
[data-theme=light]{
  --bg:#eef0f4;--t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --line:rgba(60,60,67,.12);--panel:rgba(255,255,255,.72);--panel-border:rgba(255,255,255,.45);
  --brand-grad:linear-gradient(115deg,#2a1810 0%,#8a2e16 28%,#c4451c 52%,#d4923a 78%,#c9a24a 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--t1);overflow:hidden}
body{position:fixed;inset:0}
button{font:inherit;border:0;background:0;color:inherit;cursor:pointer;touch-action:manipulation}
button:active{transform:scale(.97)}
input{font:inherit;color:inherit;font-size:16px;background:0;border:0;outline:0;width:100%}
#c{position:fixed;inset:0;z-index:0;pointer-events:none}
.fx{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 90% 60% at 18% -8%,rgba(180,50,20,.18),transparent 55%),
  radial-gradient(ellipse 70% 50% at 100% 28%,rgba(91,155,213,.14),transparent 50%),
  radial-gradient(ellipse 60% 40% at 50% 100%,rgba(212,168,83,.11),transparent 45%),
  radial-gradient(ellipse 50% 45% at 55% 40%,rgba(180,50,20,.05),transparent 60%)}
.wrap{
  position:relative;z-index:1;width:100%;height:100dvh;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(56px + var(--st)) max(18px,var(--sr)) calc(28px + var(--sb)) max(18px,var(--sl));
  gap:clamp(12px,2.4vh,22px);text-align:center;
}
.hero{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,1.6vh,16px);width:100%;max-width:420px}
.brand{
  font-family:var(--font);font-size:clamp(36px,8.5vw,56px);font-weight:700;
  letter-spacing:-.04em;line-height:1;
  background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 1px 0 rgba(180,50,20,.08));
}
.pulse{width:40px;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--ku),var(--gold),var(--blue));background-size:200%;animation:flow 4s ease infinite;opacity:.85}
@keyframes flow{50%{background-position:100%}}
.sub{font-size:clamp(13px,2.8vw,15px);font-weight:500;color:var(--t2);line-height:1.55;max-width:360px}
.panel{
  width:min(100%,400px);display:flex;flex-direction:column;gap:clamp(12px,2vh,18px);
  padding:clamp(18px,2.5vh,28px) clamp(16px,2.2vw,24px);
  border-radius:clamp(18px,2.5vw,24px);background:var(--panel);
  border:1px solid var(--panel-border);
  backdrop-filter:blur(22px) saturate(1.15);-webkit-backdrop-filter:blur(22px) saturate(1.15);
  box-shadow:0 18px 48px rgba(20,10,8,.16),0 1px 0 rgba(255,255,255,.35) inset;
}
.form{width:100%;display:flex;flex-direction:column;gap:14px;text-align:left}
.field{position:relative;border-bottom:1px solid var(--line);padding:4px 2px 10px;transition:border-color .2s}
.field:focus-within{border-color:rgba(180,50,20,.55)}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.55px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.field input{height:28px;color:var(--t1);caret-color:var(--ku)}
.field input::placeholder{color:var(--t3);font-weight:400}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;height:50px;border-radius:999px;
  font-size:15px;font-weight:600;transition:opacity .15s,transform .2s var(--spring)}
.btn-g{color:var(--t1);border:1px solid var(--line);background:rgba(255,255,255,.06)}
[data-theme=light] .btn-g{background:rgba(255,255,255,.28)}
.btn-p{background:linear-gradient(180deg,var(--ku2),var(--ku));color:#fff;box-shadow:0 10px 28px rgba(180,50,20,.28)}
.btn:disabled{opacity:.4;pointer-events:none}
.msg{min-height:18px;font-size:13px;font-weight:500;color:var(--t2);text-align:center;margin-top:4px}
.msg.e{color:var(--err)}.msg.o{color:var(--ok)}
.topbar{
  position:fixed;top:calc(10px + var(--st));right:calc(10px + var(--sr));z-index:5;
  display:flex;align-items:center;gap:8px;
}
.th,.lang-btn{
  width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);position:relative;
}
.th svg,.lang-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.lang-btn span{font-size:11px;font-weight:700;color:var(--t1)}
.lang-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;min-width:168px;padding:6px;border-radius:14px;
  border:1px solid var(--line);background:rgba(28,28,32,.94);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  box-shadow:0 12px 36px rgba(0,0,0,.12);text-align:left;z-index:6;
}
[data-theme=light] .lang-menu{background:rgba(255,255,255,.92)}
.lang-menu.on{display:block}
.lang-menu button{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 12px;border-radius:10px;
  font-size:13px;font-weight:500;color:var(--t1)}
.lang-menu button:hover{background:rgba(120,120,128,.12)}
.lang-menu button.active{color:var(--ku);font-weight:600;background:rgba(180,50,20,.08)}
.lang-menu button .code{font-size:11px;font-weight:700;color:var(--t3)}
.lang-menu button.active .code{color:var(--ku2)}
.toast{position:fixed;left:50%;bottom:calc(24px + var(--sb));transform:translateX(-50%) translateY(12px);z-index:9;
  padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;background:var(--panel);backdrop-filter:blur(16px);
  border:1px solid var(--line);opacity:0;transition:.35s var(--spring);pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%)}
body.assembling{background:#020208!important;transition:background .55s ease}
body.assembling .wrap,body.assembling .topbar{opacity:0;pointer-events:none;transition:opacity .45s ease}
@media (min-width:900px){
  .wrap{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(380px,min(46vw,520px));grid-template-rows:auto 1fr auto;
    align-items:center;align-content:center;column-gap:clamp(32px,5vw,72px);row-gap:clamp(16px,2vh,28px);
    padding:calc(56px + var(--st)) max(48px,var(--sr)) calc(36px + var(--sb)) max(48px,var(--sl));text-align:left;
  }
  .hero{grid-column:1;grid-row:1/3;align-items:flex-start;justify-content:center;text-align:left}
  .panel{grid-column:2;grid-row:1/3;width:100%;justify-self:end;align-self:center}
  .brand{font-size:clamp(48px,5.2vw,72px)}
}
@media (min-width:1280px){
  .wrap{grid-template-columns:minmax(0,1.25fr) minmax(420px,540px);column-gap:clamp(48px,6vw,96px)}
}
</style>
</head>
<body>
<canvas id="c"></canvas><div class="fx"></div>
<div class="topbar">
  <div style="position:relative">
    <button class="lang-btn" id="langBtn" type="button"><span id="langCode">EN</span></button>
    <div class="lang-menu" id="langMenu" role="listbox"></div>
  </div>
  <button class="th" id="th" type="button"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
</div>
<div class="toast" id="toast"></div>
<div class="wrap" id="wrap">
  <div class="hero">
    <div class="brand">ticacode</div>
    <div class="pulse"></div>
    <p class="sub" id="tSub">Reproduce · understand the pattern</p>
  </div>
  <div class="panel">
    <form class="form" id="form" onsubmit="return false">
      <div class="field">
        <label for="u">Account</label>
        <input id="u" type="text" placeholder="username" readonly spellcheck="false" autocomplete="off">
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input id="p" type="password" placeholder="password" readonly autocomplete="off">
      </div>
      <div class="actions">
        <button class="btn btn-g" id="bio" type="button">
          <svg viewBox="0 0 24 24"><path d="M12 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M6 20v-1a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v1"/><path d="M4 11V9a8 8 0 0 1 16 0v2"/></svg>
          <span id="tBio">Device biometrics</span>
        </button>
        <button class="btn btn-p" id="go" type="button"><span id="tGo">Continue</span></button>
      </div>
      <div class="msg" id="m">Reproduction · login UI</div>
    </form>
  </div>
  <div class="info" style="width:min(100%,400px);display:flex;flex-direction:column;gap:10px;text-align:left">
    <div class="info-card" style="border-radius:16px;padding:14px 16px;background:var(--panel);border:1px solid var(--panel-border);backdrop-filter:blur(16px)">
      <h3 style="font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ku2);margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" style="stroke:currentColor;fill:none;stroke-width:1.8"><path d="M12 2l3 7h7l-5.5 4.5L18 22l-6-4-6 4 1.5-8.5L2 9h7z"/></svg>
        <span id="tCapTitle">Capabilities</span>
      </h3>
      <ul id="tCapList" style="list-style:none;display:flex;flex-direction:column;gap:7px"></ul>
    </div>
  </div>
  <p class="foot" style="font-size:11px;color:var(--t3)">Reproduction for review</p>
</div>
<script>
/* ── Reproduce: ticalcode login UI logic ── */
const $=id=>document.getElementById(id);
const LANGS=[
  {code:'en',label:'English',short:'EN'},
  {code:'zh',label:'中文',short:'中文'},
  {code:'ja',label:'日本語',short:'JA'},
  {code:'ko',label:'한국어',short:'KO'},
];
const I18N={
  en:{sub:'Private control plane · dual-factor access<br>Per-account keys — sessions never cross',acc:'Account',pwd:'Password',bio:'Device biometrics',go:'Continue',capTitle:'Capabilities',caps:[['Dual-factor access','Biometrics + password'],['Private control plane','Multi-agent isolation']]},
  zh:{sub:'私有控制平面 · 双因子准入<br>每个账号独立密钥',acc:'账号',pwd:'密码',bio:'设备生物识别',go:'继续',capTitle:'产品能力',caps:[['双因子准入','生物识别 + 密码'],['私有控制平面','多 Agent 隔离']]},
  ja:{sub:'プライベート制御プレーン · 二要素アクセス',acc:'アカウント',pwd:'パスワード',bio:'デバイス生体認証',go:'続行',capTitle:'機能',caps:[['二要素アクセス','生体認証 + パスワード'],['プライベート制御','マルチエージェント分離']]},
  ko:{sub:'프라이빗 제어 플레인 · 이중 인증',acc:'계정',pwd:'비밀번호',bio:'기기 생체 인증',go:'계속',capTitle:'기능',caps:[['이중 인증','생체 + 비밀번호'],['프라이빗 제어','멀티 에이전트 격리']]},
};
let LANG='en';
function t(){return I18N[LANG]||I18N.en}
function applyLang(code){
  if(!I18N[code])code='en';
  LANG=code;localStorage.setItem('tc_lang',code);
  const L=t();const meta=LANGS.find(x=>x.code===code)||LANGS[0];
  if($('langCode'))$('langCode').textContent=meta.short;
  if($('tSub'))$('tSub').innerHTML=L.sub;
  if($('tBio'))$('tBio').textContent=L.bio;
  if($('tGo'))$('tGo').textContent=L.go;
  if($('tCapTitle'))$('tCapTitle').textContent=L.capTitle;
  if($('tCapList'))$('tCapList').innerHTML=(L.caps||[]).map(x=>'<li style="font-size:12.5px;color:var(--t2);padding-left:14px;position:relative;line-height:1.5">'+
    '<span style="position:absolute;left:0;top:.55em;width:5px;height:5px;border-radius:50%;background:linear-gradient(135deg,var(--ku2),var(--gold))"></span>'+
    '<strong style="color:var(--t1);font-weight:600">'+x[0]+'</strong> — '+x[1]+'</li>').join('');
  document.querySelectorAll('#langMenu button').forEach(b=>b.classList.toggle('active',b.dataset.code===code));
}
function buildLangMenu(){
  const menu=$('langMenu');
  menu.innerHTML=LANGS.map(l=>'<button type="button" data-code="'+l.code+'"'+(l.code===LANG?' class="active"':'')+'>'+
    '<span>'+l.label+'</span><span class="code">'+l.short+'</span></button>').join('');
  menu.querySelectorAll('button').forEach(b=>{b.onclick=()=>{applyLang(b.dataset.code);closeLangMenu()}});
}
function closeLangMenu(){const m=$('langMenu'),b=$('langBtn');if(m)m.classList.remove('on');if(b)b.setAttribute('aria-expanded','false')}
function openLangMenu(){const m=$('langMenu'),b=$('langBtn');if(m)m.classList.add('on');if(b)b.setAttribute('aria-expanded','true')}
function toggleLangMenu(){const m=$('langMenu');m&&m.classList.contains('on')?closeLangMenu():openLangMenu()}
$('langBtn').onclick=e=>{e.stopPropagation();toggleLangMenu()};
document.addEventListener('click',e=>{const m=$('langMenu'),b=$('langBtn');if(!m||!b)return;if(!m.contains(e.target)&&!b.contains(e.target))closeLangMenu()});
let saved='en';try{saved=localStorage.getItem('tc_lang')||'en'}catch(e){}
if(!I18N[saved])saved='en';buildLangMenu();applyLang(saved);

/* Theme */
function theme(th){
  document.documentElement.setAttribute('data-theme',th);
  localStorage.setItem('tc_theme',th);
  const m=document.querySelector('meta[name=theme-color]');
  if(m)m.content=th==='dark'?'#050506':'#f5f5f7';
}
theme(localStorage.getItem('tc_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
$('th').onclick=()=>theme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

/* ── Particle FX (canvas) ── */
const FX=(function(){
  const c=$('c'),x=c.getContext('2d');
  let W=0,H=0,dpr=1,p=[],mode='drift',alignT=0,alignStart=0,edges=[],stars=[];
  const ptr={x:0,y:0,active:false,down:false};
  const PALETTE_DARK=[[255,255,255],[255,210,190],[212,168,83],[91,155,213]];
  const PALETTE_LIGHT=[[50,36,32],[200,55,22],[170,120,40],[45,105,175]];
  function resize(){
    dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
    c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
    x.setTransform(dpr,0,0,dpr,0,0);
  }
  function seed(){
    const N=Math.min(160,Math.max(64,Math.floor(W*H/12000)));
    p=[];for(let i=0;i<N;i++){
      const speed=.08+Math.random()*.28,ang=Math.random()*Math.PI*2;
      p.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,
        r:1.4+Math.random()*3.2,ph:Math.random()*Math.PI*2,breath:.35+Math.random()*.75,
        spin:(Math.random()-.5)*.9,hue:Math.floor(Math.random()*PALETTE_DARK.length),
        wander:.55+Math.random()*1.1,tx:0,ty:0});
    }
  }
  function assignRandomTargets(){
    const n=p.length,padX=W*0.05,padY=H*0.07,spanX=W-padX*2,spanY=H-padY*2;
    const minDist=Math.max(56,Math.sqrt((spanX*spanY)/(n*0.72)));
    const placed=[];edges=[];stars=[];
    for(let i=0;i<n;i++){
      let x=padX+Math.random()*spanX,y=padY+Math.random()*spanY,ok=false;
      for(let tries=0;tries<48;tries++){x=padX+Math.random()*spanX;y=padY+Math.random()*spanY;ok=true;
        for(let k=0;k<placed.length;k++){if(Math.hypot(placed[k].x-x,placed[k].y-y)<minDist*0.55){ok=false;break}}if(ok)break}
      placed.push({x,y});p[i].tx=x;p[i].ty=y;
    }
    const seen=new Set(),maxReach=Math.min(W,H)*0.38;
    for(let i=0;i<p.length;i++){
      const cands=[];for(let j=0;j<p.length;j++){if(i===j)continue;const dd=Math.hypot(p[i].tx-p[j].tx,p[i].ty-p[j].ty);if(dd>8&&dd<maxReach)cands.push({j,dd})}
      cands.sort((a,b)=>a.dd-b.dd);
      let picked=0;const want=1+(Math.random()<0.5?1:0);
      for(let k=0;k<cands.length&&picked<want;k++){const j=cands[k].j;const a=Math.min(i,j),b=Math.max(i,j),key=a+':'+b;if(seen.has(key))continue;seen.add(key);edges.push({i:a,j:b});picked++}
    }
    for(let s=0;s<Math.min(90,Math.floor(W*H/22000));s++)stars.push({x:Math.random()*W,y:Math.random()*H,r:.35+Math.random()*1.1,a:.15+Math.random()*.55,ph:Math.random()*Math.PI*2,tw:.6+Math.random()*1.8});
  }
  function align(ms){assignRandomTargets();mode='align';alignT=ms||1600;alignStart=performance.now();document.body.classList.add('assembling');return new Promise(res=>setTimeout(res,alignT+280))}
  function draw(now){
    x.clearRect(0,0,W,H);
    const dark=mode==='align'||document.documentElement.getAttribute('data-theme')==='dark';
    const palette=dark?PALETTE_DARK:PALETTE_LIGHT;
    const col=dark?'255,236,220':'40,24,18';
    const gold=dark?'255,200,120':'200,120,40';
    const tt=now*0.001;let progress=0;
    if(mode==='align'){progress=Math.min(1,(now-alignStart)/alignT);progress=1-Math.pow(1-progress,3)}
    if(mode==='align'&&stars.length){const si=Math.min(1,progress*1.4);for(let s=0;s<stars.length;s++){const st=stars[s];const a=st.a*(.55+.45*Math.sin(tt*st.tw+st.ph))*si;x.beginPath();x.arc(st.x,st.y,st.r,0,Math.PI*2);x.fillStyle=`rgba(220,230,255,${a})`;x.fill()}}
    for(let i=0;i<p.length;i++){
      const a=p[i];
      if(mode==='drift'){
        a.vx+=(Math.random()-.5)*.012*a.wander;a.vy+=(Math.random()-.5)*.012*a.wander;
        if(ptr.active){const dx=ptr.x-a.x,dy=ptr.y-a.y,dd=Math.hypot(dx,dy)||1,radius=ptr.down?220:160;if(dd<radius){const f=1-dd/radius,pull=(ptr.down?.085:.038)*f*f;a.vx+=dx/dd*pull;a.vy+=dy/dd*pull;a.vx+=(-dy/dd)*f*.018;a.vy+=(dx/dd)*f*.018}}}
        a.vx*=.988;a.vy*=.988;const lim=.72;a.vx=Math.max(-lim,Math.min(lim,a.vx));a.vy=Math.max(-lim,Math.min(lim,a.vy));
        a.x+=a.vx;a.y+=a.vy;if(a.x<-10)a.x=W+10;if(a.x>W+10)a.x=-10;if(a.y<-10)a.y=H+10;if(a.y>H+10)a.y=-10;
      }else{
        a.x+=(a.tx-a.x)*(.045+progress*.08);a.y+=(a.ty-a.y)*(.045+progress*.08);
        const shake=(1-progress)*.32;a.x+=Math.sin(tt*2.6+a.ph)*shake;a.y+=Math.cos(tt*2.2+a.ph*1.3)*shake;
        if(progress>.85){a.x+=Math.sin(tt*a.breath+a.ph)*.18;a.y+=Math.cos(tt*a.breath*.9+a.ph)*.16}
      }
      const grow=mode==='align'?(.5+progress*1.35):(1+Math.sin(tt*a.breath+a.ph)*.38);
      const rr=a.r*grow,baseA=mode==='align'?(.28+progress*.62):(.52+Math.sin(tt*a.breath+a.ph)*.22);
      const rgb=palette[a.hue%palette.length];
      if(rr>1){const h=mode==='align'?rr*3.8:rr*3.6,grd=x.createRadialGradient(a.x,a.y,0,a.x,a.y,h);grd.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${Math.min(.85,baseA*.55)})`);grd.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);x.beginPath();x.arc(a.x,a.y,h,0,Math.PI*2);x.fillStyle=grd;x.fill()}
      x.beginPath();x.arc(a.x,a.y,rr,0,Math.PI*2);x.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${Math.min(.96,baseA)})`;x.fill();
    }
    if(mode==='align'&&edges.length){const mi=Math.max(0,Math.min(1,(progress-.22)/.58));if(mi>.01){const la=.1+mi*.32;for(let e=0;e<edges.length;e++){const ed=edges[e],a=p[ed.i],b=p[ed.j];if(!a||!b)continue;const lf=Math.max(.2,1-Math.hypot(a.x-b.x,a.y-b.y)/(Math.min(W,H)*.55));x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.strokeStyle=`rgba(${col},${la*lf*mi*.85})`;x.lineWidth=.55+lf*.55;x.stroke()}}}
    requestAnimationFrame(draw);
  }
  resize();seed();
  addEventListener('resize',()=>{resize();if(mode==='align')assignRandomTargets();else seed()});
  addEventListener('pointermove',e=>{ptr.x=e.clientX;ptr.y=e.clientY;ptr.active=true;ptr.down=!!(e.buttons>0)});
  addEventListener('pointerdown',e=>{ptr.x=e.clientX;ptr.y=e.clientY;ptr.active=true;ptr.down=true});
  addEventListener('pointerup',()=>{ptr.down=false});
  document.addEventListener('mouseleave',()=>{ptr.active=false;ptr.down=false});
  requestAnimationFrame(draw);
  return {align};
})();

/* ── Auth flow: biometric + dual login (mock) ── */
async function bio(){
  const L=t();
  if(!window.PublicKeyCredential){msg(L.bio||'Bio unavailable','e');return false}
  msg('Biometric challenge issued (mock)','o');toast('✓ Biometric verified');
  return true;
}
async function go(){
  const L=t();const u=($('u').value||'').trim(),p=$('p').value||'';
  if(!u){msg('Account required','e');return}if(!p){msg('Password required','e');return}
  msg('Signing in…');$('go').disabled=true;$('bio').disabled=true;
  setTimeout(async()=>{
    msg('✓ Demo login success','o');toast('Welcome');
    await FX.align(1680);
    msg('Reproduction complete','o');
    $('go').disabled=false;$('bio').disabled=false;
  },800);
}
$('bio').onclick=bio;$('go').onclick=go;
$('p').onkeydown=e=>{if(e.key==='Enter')go()};
$('u').onkeydown=e=>{if(e.key==='Enter')$('p').focus()};

/* Anti-autofill */
let _ue=false;
['u','p'].forEach(id=>{const el=$(id);if(!el)return;
  el.addEventListener('focus',()=>el.removeAttribute('readonly'));
  el.addEventListener('pointerdown',()=>el.removeAttribute('readonly'));
  el.addEventListener('input',()=>{_ue=true});
});
function scrub(){if(!_ue){const u=$('u'),p=$('p');if(u)u.value='';if(p)p.value=''}}
scrub();[50,150,400].forEach(ms=>setTimeout(scrub,ms));
addEventListener('pageshow',()=>{if(!_ue){scrub();setTimeout(scrub,50)}});

function toast(txt){const e=$('toast');e.textContent=txt;e.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('on'),2200)}
function msg(txt,k){const e=$('m');e.textContent=txt||'';e.className='msg'+(k?' '+k:'')}
</script>
