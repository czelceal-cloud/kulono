<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Kulono · interactive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap');
:root{
  --ku:#b43214;--ku2:#d4461a;--gold:#d4a853;--blue:#5b9bd5;
  --bg:#050506;--t1:#f5f5f7;--t2:#98989d;--t3:#636366;
  --fill:rgba(120,120,128,.14);--sep:rgba(255,255,255,.08);
  --side-bg:rgba(10,10,12,.62);--panel:rgba(18,14,16,.72);
  --ok:#34c759;--err:#ff3b30;
  --r:14px;--pill:999px;
  --sh1:0 1px 2px rgba(0,0,0,.35);--sh2:0 12px 36px rgba(0,0,0,.4);--sh3:0 24px 56px rgba(0,0,0,.5);
  --blur:blur(22px) saturate(1.2);--blur2:blur(32px) saturate(1.4);
  --font:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --brand-grad:linear-gradient(115deg,#fff5eb 0%,#f0a070 22%,#e07040 48%,#e0b060 76%,#f0d090 100%);
  --spring:cubic-bezier(.32,.72,0,1);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
[data-theme=light]{
  --bg:#e8eaef;--t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --fill:rgba(120,120,128,.08);--sep:rgba(60,60,67,.1);
  --side-bg:rgba(250,250,252,.62);--panel:rgba(255,255,255,.72);
  --brand-grad:linear-gradient(115deg,#2a1810 0%,#8a2e16 28%,#c4451c 52%,#d4923a 78%,#c9a24a 100%);
  --sh1:0 1px 2px rgba(0,0,0,.04);--sh2:0 8px 28px rgba(0,0,0,.07);--sh3:0 20px 50px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--t1);overflow:hidden}
body{position:fixed;inset:0;width:100%}
button{font:inherit;border:0;background:0;color:inherit;cursor:pointer;touch-action:manipulation}
button:active{transform:scale(.97)}
#stage{position:fixed;inset:0;z-index:0;pointer-events:auto}
.scene{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .6s ease}
.scene.active{opacity:1;pointer-events:auto}

/* Top bar */
.topbar{
  position:fixed;top:calc(14px + var(--st));left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:8px 20px;border-radius:var(--pill);
  background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:.5px solid var(--sep);box-shadow:var(--sh2);
}
.logo{font-weight:700;font-size:15px;letter-spacing:-.3px;background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar .sep{width:1px;height:18px;background:var(--sep)}
.topbar .th{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.topbar .th svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7}

/* Bottom nav */
.botnav{
  position:fixed;bottom:calc(16px + var(--sb));left:50%;transform:translateX(-50%);z-index:10;
  display:flex;align-items:center;gap:4px;padding:6px;border-radius:18px;
  background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:.5px solid var(--sep);box-shadow:var(--sh3);
}
.nav-btn{
  padding:10px 18px;border-radius:14px;font-size:13px;font-weight:600;color:var(--t3);
  display:flex;align-items:center;gap:8px;transition:.25s var(--spring);white-space:nowrap;
}
.nav-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
.nav-btn.on{background:var(--item-active,rgba(180,50,20,.16));color:var(--ku)}
@media(max-width:480px){.nav-btn{padding:10px 14px;font-size:12px}.nav-btn span{display:none}}

/* Scene overlay HUD */
.hud{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:5;
  text-align:center;pointer-events:none;
  padding:16px 24px;border-radius:20px;min-width:200px;
  background:var(--panel);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border:.5px solid var(--sep);box-shadow:var(--sh3);
  transition:opacity .4s ease,transform .4s var(--spring);
}
.hud h2{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:4px}
.hud p{font-size:13px;color:var(--t2);line-height:1.45}
.hud.hidden{opacity:0;transform:translateX(-50%) translateY(12px);pointer-events:none}

/* Scene 1: 3D canvas */
#s1{position:absolute;inset:0;z-index:0}
#s1 canvas{display:block;width:100%;height:100%}

/* Scene 2: 2D interactive */
#s2{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#s2 canvas{border-radius:24px;box-shadow:var(--sh3);max-width:min(90vw,800px);max-height:min(80vh,600px);width:100%;height:auto;aspect-ratio:4/3;cursor:crosshair}

/* Scene 3: Canvas */
#s3{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#s3 canvas{border-radius:24px;box-shadow:var(--sh3);max-width:min(90vw,800px);max-height:min(80vh,600px);width:100%;height:auto;aspect-ratio:4/3;cursor:pointer}

/* Tips */
.tip{
  position:fixed;top:calc(68px + var(--st));left:50%;transform:translateX(-50%);z-index:6;
  font-size:12px;color:var(--t3);background:var(--panel);backdrop-filter:var(--blur);
  padding:6px 14px;border-radius:var(--pill);border:.5px solid var(--sep);
  opacity:0;transition:opacity .6s;pointer-events:none;
}
.tip.on{opacity:1}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="stage"></div>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">KULONO</span>
  <span class="sep"></span>
  <button class="th" id="th"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
</div>

<!-- Tip -->
<div class="tip" id="tip">Drag to rotate · Scroll to zoom</div>

<!-- HUD -->
<div class="hud" id="hud">
  <h2 id="hudTitle">3D Gallery</h2>
  <p id="hudDesc">Interactive geometric shapes with real-time lighting</p>
</div>

<!-- Scenes -->
<div class="scene active" id="s1"></div>
<div class="scene" id="s2"></div>
<div class="scene" id="s3"></div>

<!-- Bottom nav -->
<div class="botnav">
  <button class="nav-btn on" data-s="0"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>3D</span></button>
  <button class="nav-btn" data-s="1"><svg viewBox="0 0 24 24"><path d="M12 20V10M18 20V4M6 20v-4"/></svg><span>Waves</span></button>
  <button class="nav-btn" data-s="2"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span>Constellation</span></button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Theme ──
function theme(th){document.documentElement.setAttribute('data-theme',th);localStorage.setItem('tc_theme',th)}
theme(localStorage.getItem('tc_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
document.getElementById('th').onclick=()=>theme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

const $=id=>document.getElementById(id);
const scenes=[$('s1'),$('s2'),$('s3')];
const navBtns=document.querySelectorAll('.nav-btn');
const tip=$('tip');
const hudTitles=['3D Gallery','Wave Studio','Constellation Builder'];
const hudDescs=[
  'Interactive geometric shapes with real-time lighting — drag to orbit, scroll to zoom',
  'Draw colourful waveforms with your mouse — click & drag to create patterns',
  'Click to place stars — nodes auto-connect into a living constellation mesh'
];
let curScene=0;

function switchScene(idx){
  scenes.forEach((s,i)=>s.classList.toggle('active',i===idx));
  navBtns.forEach((b,i)=>b.classList.toggle('on',i===idx));
  $('hudTitle').textContent=hudTitles[idx];
  $('hudDesc').textContent=hudDescs[idx];
  const tips=['Drag & scroll to explore','Click & drag to draw waves','Click to add stars'];
  tip.textContent=tips[idx];
  tip.classList.add('on');
  setTimeout(()=>tip.classList.remove('on'),3000);
  curScene=idx;
  if(idx===0)start3D();
  if(idx===1)startWaves();
  if(idx===2)startConstellation();
}

navBtns.forEach(b=>b.addEventListener('click',()=>switchScene(parseInt(b.dataset.s))));

// ── Scene 1: Three.js 3D ──
let threeRunning=false,threeCleanup=null;
function start3D(){
  if(threeRunning)return;
  threeRunning=true;
  const container=$('s1');
  container.innerHTML='';
  const w=container.clientWidth,h=container.clientHeight;

  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(w,h);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.2;
  container.appendChild(renderer.domElement);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,w/h,.1,100);
  camera.position.set(6,4,8);

  const controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;controls.dampingFactor=.08;
  controls.minDistance=3;controls.maxDistance=20;
  controls.autoRotate=true;controls.autoRotateSpeed=1.2;

  // Lights
  const ambient=new THREE.AmbientLight(0x404060,.6);
  scene.add(ambient);
  const key=new THREE.DirectionalLight(0xff8844,2.2);
  key.position.set(5,8,4);scene.add(key);
  const fill=new THREE.DirectionalLight(0x4488ff,1.0);
  fill.position.set(-3,1,-4);scene.add(fill);
  const rim=new THREE.DirectionalLight(0xffffff,.6);
  rim.position.set(-2,-3,5);scene.add(rim);

  // Objects
  const objects=[];
  function makeObj(geo,color,pos,mat=null){
    const m=mat||new THREE.MeshPhysicalMaterial({
      color,metalness:.3,roughness:.35,clearcoat:.4,clearcoatRoughness:.3,
      envMapIntensity:.8
    });
    const mesh=new THREE.Mesh(geo,m);
    mesh.position.set(pos[0],pos[1],pos[2]);
    scene.add(mesh);
    objects.push({mesh,rotSpeed:[.3+.5*Math.random(),.2+.4*Math.random(),.1+.3*Math.random()]});
    return mesh;
  }
  makeObj(new THREE.TorusGeometry(1.2,.35,48,64),0xd4461a,[-2.5,0,0]);
  makeObj(new THREE.IcosahedronGeometry(1.15,1),0x5b9bd5,[2.5,0,0]);
  makeObj(new THREE.TorusKnotGeometry(.9,.3,100,16),0xd4a853,[0,1.6,0]);
  makeObj(new THREE.OctahedronGeometry(1.0),0xb43214,[0,-1.8,0]);
  makeObj(new THREE.ConeGeometry(1.0,1.6,6),0x34c759,[-2.7,-1.2,-1.5]);
  makeObj(new THREE.CylinderGeometry(.7,1.0,1.4,8),0xff9500,[2.7,1.2,-1.5]);

  // Ground ring
  const ringGeo=new THREE.RingGeometry(2.8,3.6,64);
  const ringMat=new THREE.MeshPhysicalMaterial({
    color:0x666688,metalness:.6,roughness:.2,transparent:true,opacity:.15,side:THREE.DoubleSide
  });
  const ring=new THREE.Mesh(ringGeo,ringMat);
  ring.rotation.x=-Math.PI/2;ring.position.y=-2.4;
  scene.add(ring);

  // Particles
  const partCount=800;
  const posArr=new Float32Array(partCount*3);
  for(let i=0;i<partCount*3;i++)posArr[i]=(Math.random()-.5)*30;
  const partGeo=new THREE.BufferGeometry();
  partGeo.setAttribute('position',new THREE.BufferAttribute(posArr,3));
  const partMat=new THREE.PointsMaterial({
    color:0x888899,size:.06,transparent:true,opacity:.6,sizeAttenuation:true
  });
  const parts=new THREE.Points(partGeo,partMat);
  scene.add(parts);

  let animId;
  function animate(t){
    animId=requestAnimationFrame(animate);
    objects.forEach(o=>{o.mesh.rotation.x+=o.rotSpeed[0]*.008;o.mesh.rotation.y+=o.rotSpeed[1]*.008;o.mesh.rotation.z+=o.rotSpeed[2]*.008});
    parts.rotation.y+=.001;
    controls.update();
    renderer.render(scene,camera);
  }
  animate();

  const resize=()=>{const w2=container.clientWidth,h2=container.clientHeight;camera.aspect=w2/h2;camera.updateProjectionMatrix();renderer.setSize(w2,h2)};
  window.addEventListener('resize',resize);
  threeCleanup=()=>{cancelAnimationFrame(animId);renderer.dispose();window.removeEventListener('resize',resize);container.innerHTML='';threeRunning=false};
}

// ── Scene 2: Wave Studio (2D Canvas) ──
let waveRunning=false,waveCleanup=null;
function startWaves(){
  if(waveRunning)return;
  waveRunning=true;
  const container=$('s2');
  container.innerHTML='<canvas id="wCanvas"></canvas>';
  const canvas=$('wCanvas');
  const ctx=canvas.getContext('2d');
  let W=0,H=0;
  function resize(){
    const rect=container.getBoundingClientRect();
    const maxW=Math.min(rect.width*.9,800),maxH=Math.min(rect.height*.8,600);
    const aspect=4/3;
    let w=maxW,h=w/aspect;if(h>maxH){h=maxH;w=h*aspect}
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    canvas.width=w*2;canvas.height=h*2;
    W=canvas.width;H=canvas.height;
    ctx.scale(1,1);
  }
  resize();window.addEventListener('resize',resize);

  const waves=[];
  let mouseDown=false,mx=0,my=0;
  canvas.addEventListener('pointerdown',e=>{mouseDown=true;mx=e.offsetX*2;my=e.offsetY*2;addWave(mx,my)});
  canvas.addEventListener('pointermove',e=>{mx=e.offsetX*2;my=e.offsetY*2;if(mouseDown)addWave(mx,my)});
  canvas.addEventListener('pointerup',()=>mouseDown=false);
  canvas.addEventListener('pointerleave',()=>mouseDown=false);

  function addWave(x,y){
    waves.push({
      x,y,phase:Math.random()*Math.PI*2,freq:.5+Math.random()*2,
      amp:20+Math.random()*60,color:[180+Math.random()*75,50+Math.random()*100,20+Math.random()*80],
      life:1,decay:.005+Math.random()*.008
    });
    if(waves.length>60)waves.splice(0,waves.length-60);
  }

  // Seed some initial waves
  for(let i=0;i<12;i++)addWave(Math.random()*800,Math.random()*600);

  function drawWaves(t){
    const tt=t*.001;
    ctx.fillStyle='rgba(5,5,8,.15)';
    ctx.fillRect(0,0,W,H);

    waves.forEach((w,i)=>{
      w.life=Math.max(0,w.life-w.decay);
      const alpha=w.life*.7;
      const step=4;
      ctx.beginPath();
      for(let x=0;x<W;x+=step){
        const dist=Math.abs(x-w.x);
        const y=w.y+Math.sin(dist*.02*w.freq+tt*2.5+w.phase)*w.amp*w.life;
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.strokeStyle=`rgba(${w.color[0]|0},${w.color[1]|0},${w.color[2]|0},${alpha})`;
      ctx.lineWidth=2.5*w.life;
      ctx.lineCap='round';
      ctx.stroke();

      // mirrored bottom
      ctx.beginPath();
      for(let x=0;x<W;x+=step){
        const dist=Math.abs(x-w.x);
        const y=w.y-Math.sin(dist*.02*w.freq+tt*2.5+w.phase)*w.amp*w.life;
        if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.strokeStyle=`rgba(${w.color[0]|0},${w.color[1]|0},${w.color[2]|0},${alpha*.4})`;
      ctx.lineWidth=1.2*w.life;
      ctx.stroke();
    });

    // Clean dead waves
    for(let i=waves.length-1;i>=0;i--)if(waves[i].life<=.01)waves.splice(i,1);

    // Cursor glow
    if(mouseDown){
      const g=ctx.createRadialGradient(mx,my,0,mx,my,60);
      g.addColorStop(0,`rgba(212,168,83,.15)`);
      g.addColorStop(1,`rgba(212,168,83,0)`);
      ctx.fillStyle=g;ctx.fillRect(mx-60,my-60,120,120);
    }

    requestAnimationFrame(drawWaves);
  }
  requestAnimationFrame(drawWaves);
  waveCleanup=()=>{waveRunning=false};
}

// ── Scene 3: Constellation Builder ──
let constRunning=false,constCleanup=null;
function startConstellation(){
  if(constRunning)return;
  constRunning=true;
  const container=$('s3');
  container.innerHTML='<canvas id="cCanvas"></canvas>';
  const canvas=$('cCanvas');
  const ctx=canvas.getContext('2d');
  let W=0,H=0;
  function resize(){
    const rect=container.getBoundingClientRect();
    const maxW=Math.min(rect.width*.9,800),maxH=Math.min(rect.height*.8,600);
    const aspect=4/3;
    let w=maxW,h=w/aspect;if(h>maxH){h=maxH;w=h*aspect}
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    canvas.width=w*2;canvas.height=h*2;
    W=canvas.width;H=canvas.height;
  }
  resize();window.addEventListener('resize',resize);

  let nodes=[];
  // Seed some nodes
  for(let i=0;i<18;i++){
    nodes.push({
      x:40+Math.random()*(W-80),y:40+Math.random()*(H-80),
      r:3+Math.random()*5,vx:0,vy:0,pulse:Math.random()*Math.PI*2
    });
  }

  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*2,y=(e.clientY-rect.top)*2;
    if(x>=0&&x<=W&&y>=0&&y<=H){
      nodes.push({x,y,r:3+Math.random()*5,vx:0,vy:0,pulse:Math.random()*Math.PI*2});
    }
  });

  function drawConst(t){
    const tt=t*.001;
    ctx.fillStyle='rgba(5,5,8,.08)';
    ctx.fillRect(0,0,W,H);

    // Draw edges (connect nearby nodes)
    const maxDist=Math.min(W,H)*.28;
    const edges=[];
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<maxDist){edges.push({i,j,dist})}
      }
    }

    // Sort edges by distance and keep only shorter ones
    edges.sort((a,b)=>a.dist-b.dist);
    const kept=edges.slice(0,Math.min(edges.length,Math.floor(nodes.length*2.2)));

    // Draw edges
    kept.forEach(e=>{
      const a=nodes[e.i],b=nodes[e.j];
      const alpha=(1-e.dist/maxDist)*.35;
      const pulse=.6+.4*Math.sin(tt*.5+e.i+e.j);
      if(pulse>.2){
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(212,168,83,${alpha*pulse})`;
        ctx.lineWidth=.8+.4*(1-e.dist/maxDist);ctx.stroke();
      }
    });

    // Draw nodes
    nodes.forEach(n=>{
      const pulse=.6+.4*Math.sin(tt*.8+n.pulse);
      const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);
      glow.addColorStop(0,`rgba(212,168,83,${.12*pulse})`);
      glow.addColorStop(1,`rgba(212,168,83,0)`);
      ctx.fillStyle=glow;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*pulse,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,220,${.5+.5*pulse})`;
      ctx.fill();
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${.7*pulse})`;
      ctx.fill();
    });

    // Traveling spark on random edge
    if(kept.length>3){
      const re=kept[Math.floor(Math.abs(Math.sin(tt*.3))*kept.length)%kept.length];
      const t2=((tt*.15+re.i)%1+1)%1;
      const sx=nodes[re.i].x+(nodes[re.j].x-nodes[re.i].x)*t2;
      const sy=nodes[re.i].y+(nodes[re.j].y-nodes[re.i].y)*t2;
      const g2=ctx.createRadialGradient(sx,sy,0,sx,sy,8);
      g2.addColorStop(0,`rgba(255,245,220,.8)`);
      g2.addColorStop(.5,`rgba(212,168,83,.3)`);
      g2.addColorStop(1,`rgba(212,168,83,0)`);
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(sx,sy,8,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();
    }

    if(nodes.length>45)nodes.splice(0,nodes.length-45);
    requestAnimationFrame(drawConst);
  }
  requestAnimationFrame(drawConst);
  constCleanup=()=>{constRunning=false};
}

// Init
switchScene(0);
</script>
