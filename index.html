<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>ticacode · agent console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap');
:root{
  --ku:#b43214;--ku2:#d4461a;--gold:#d4a853;--blue:#5b9bd5;
  --bg:#050506;--t1:#f5f5f7;--t2:#98989d;--t3:#636366;
  --fill:rgba(120,120,128,.14);--sep:rgba(255,255,255,.08);
  --side-bg:rgba(10,10,12,.62);--item-hover:rgba(255,255,255,.05);
  --item-active:rgba(180,50,20,.16);--ok:#34c759;--err:#ff3b30;
  --r:14px;--pill:999px;
  --sh1:0 1px 2px rgba(0,0,0,.35);--sh2:0 12px 36px rgba(0,0,0,.4);--sh3:0 24px 56px rgba(0,0,0,.5);--shb:0 8px 28px rgba(180,50,20,.28);
  --blur:blur(18px) saturate(1.3);--blur2:blur(28px) saturate(1.4);
  --font:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --brand-grad:linear-gradient(115deg,#fff5eb 0%,#f0a070 22%,#e07040 48%,#e0b060 76%,#f0d090 100%);
  --spring:cubic-bezier(.32,.72,0,1);--out:cubic-bezier(.16,1,.3,1);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --side:clamp(260px,26vw,340px);--pad:clamp(10px,2vw,18px);--hit:48px;
  --app-h:100dvh;
}
[data-theme=light]{
  --bg:#e8eaef;--t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --fill:rgba(120,120,128,.08);--sep:rgba(60,60,67,.1);
  --side-bg:rgba(250,250,252,.55);--item-hover:rgba(120,120,128,.08);
  --item-active:rgba(180,50,20,.08);
  --brand-grad:linear-gradient(115deg,#2a1810 0%,#8a2e16 28%,#c4451c 52%,#d4923a 78%,#c9a24a 100%);
  --sh1:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);--sh2:0 8px 28px rgba(0,0,0,.07);--sh3:0 20px 50px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:var(--bg);color:var(--t1);overflow:hidden;position:fixed;inset:0;width:100%}
button{font:inherit;border:0;background:0;color:inherit;cursor:pointer;touch-action:manipulation}
button:active,.press:active{transform:scale(.97)}
textarea,input{font:inherit;color:inherit;font-size:16px}
svg.i{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block}
#c{position:fixed;inset:0;z-index:0;pointer-events:none}
.fx{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse 100% 70% at 0% 0%,rgba(180,50,20,.12),transparent 52%),
  radial-gradient(ellipse 80% 55% at 100% 15%,rgba(91,155,213,.1),transparent 50%),
  radial-gradient(ellipse 70% 45% at 50% 100%,rgba(212,168,83,.08),transparent 48%)}
.toast{position:fixed;left:50%;bottom:calc(20px + var(--sb));transform:translateX(-50%) translateY(10px);z-index:100;
  padding:11px 18px;border-radius:var(--pill);font-size:13px;font-weight:500;max-width:min(90vw,360px);text-align:center;
  background:rgba(255,255,255,.72);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:.5px solid var(--sep);
  box-shadow:var(--sh2);opacity:0;pointer-events:none;transition:.35s var(--spring)}
[data-theme=dark] .toast{background:rgba(30,30,34,.82)}
.toast.on{opacity:1;transform:translateX(-50%)}
.app{position:relative;z-index:auto;display:flex;width:100%;max-width:100vw;height:var(--app-h)}
.side{width:var(--side);flex-shrink:0;display:flex;flex-direction:column;height:100%;max-height:var(--app-h);min-height:0;overflow:hidden;
  background:var(--side-bg);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
  border-right:.5px solid var(--sep);position:relative;z-index:2}
.side-h{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(14px + var(--st)) 14px 10px;flex-shrink:0}
.logo{font-family:var(--font);font-size:clamp(18px,2vw,21px);font-weight:700;letter-spacing:-.03em;
  background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.ib{width:var(--hit);height:var(--hit);min-width:44px;min-height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--fill)}
.lbl{font-size:11px;font-weight:600;letter-spacing:.45px;text-transform:uppercase;color:var(--t2);padding:6px 16px 8px;flex-shrink:0}
.list{flex:1 1 auto;min-height:0;overflow-x:hidden;overflow-y:auto;padding:0 6px 12px;-webkit-overflow-scrolling:touch}
.item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:16px;min-height:58px;margin-bottom:2px;
  width:100%;text-align:left;background:transparent;border:.5px solid transparent;cursor:pointer;color:inherit;
  transition:background .15s var(--out),border-color .15s}
.item:hover{background:var(--item-hover)}
.item.active{background:var(--item-active);border-color:rgba(180,50,20,.22)}
.av{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;position:relative;
  box-shadow:0 0 0 1px rgba(255,255,255,.18),0 4px 14px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.92);
  text-shadow:0 1px 2px rgba(0,0,0,.25)}
.meta{flex:1;min-width:0;text-align:left;pointer-events:none}
.meta .n{font-size:15px;font-weight:600;letter-spacing:-.25px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta .s{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.dot.on{background:var(--ok);box-shadow:0 0 0 3px rgba(52,199,89,.18)}
.side-f{display:flex;gap:8px;padding:10px 10px calc(12px + var(--sb));border-top:.5px solid var(--sep);flex-shrink:0}
.side-f .ib{flex:1;font-size:12px;font-weight:600;gap:6px;width:auto;padding:0 10px}
.main{flex:1;min-width:0;display:flex;flex-direction:column;position:relative;background:transparent}
.top{display:flex;align-items:center;gap:12px;min-height:56px;padding:10px var(--pad);padding-top:calc(10px + var(--st));
  background:var(--side-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:.5px solid var(--sep)}
.top .av{width:34px;height:34px;font-size:11px}
.top .ti{flex:1;min-width:0}
.top .ti .n{font-size:clamp(15px,1.5vw,17px);font-weight:600;letter-spacing:-.3px}
.top .ti .s{font-size:12px;color:var(--t2);margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:clamp(12px,2.5vw,22px) var(--pad) 12px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;max-width:min(720px,100%);animation:up .32s var(--spring)}
.msg-row.me{align-self:flex-end}.msg-row.them{align-self:flex-start}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bub{padding:12px 16px;border-radius:18px;font-size:clamp(14px,.3vw+13px,16px);line-height:1.45;letter-spacing:-.15px;word-break:break-word;white-space:pre-wrap}
.me .bub{background:linear-gradient(160deg,var(--ku2),var(--ku));color:#fff;border-bottom-right-radius:6px;box-shadow:var(--shb)}
.them .bub{background:rgba(255,255,255,.55);border:.5px solid var(--sep);border-bottom-left-radius:6px;box-shadow:var(--sh1)}
[data-theme=dark] .them .bub{background:rgba(255,255,255,.08)}
.comp{padding:10px var(--pad) calc(10px + var(--sb));
  background:var(--side-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:.5px solid var(--sep)}
.comp-in{display:flex;align-items:flex-end;gap:8px;max-width:min(900px,100%);margin:0 auto}
.tb{width:var(--hit);height:var(--hit);min-width:44px;min-height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;
  background:var(--fill);border:.5px solid var(--sep);flex-shrink:0}
.field{flex:1;min-width:0;display:flex;align-items:flex-end;min-height:var(--hit);
  background:rgba(255,255,255,.45);border:.5px solid var(--sep);border-radius:22px;padding:4px 4px 4px 16px;box-shadow:var(--sh1)}
[data-theme=dark] .field{background:rgba(255,255,255,.06)}
.field textarea{flex:1;border:0;outline:0;background:0;resize:none;line-height:1.35;min-height:36px;max-height:120px;padding:10px 0;color:var(--t1)}
.send{width:40px;height:40px;border-radius:50%;background:linear-gradient(180deg,var(--ku2),var(--ku));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shb)}
.send:disabled{opacity:.35}.send svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;color:var(--t2);font-size:13px;line-height:1.5}
.menu-float{position:fixed;top:calc(10px + var(--st));left:calc(10px + var(--sl));z-index:30;
  width:44px;height:44px;border-radius:14px;display:none;align-items:center;justify-content:center;
  background:var(--side-bg);backdrop-filter:blur(14px);border:.5px solid var(--sep);box-shadow:var(--sh1)}
.scrim{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.28)}
.scrim.on{display:block}
@media(max-width:860px){
  .side{position:fixed;left:0;top:0;bottom:0;z-index:40;width:min(86vw,320px);height:100%;
    transform:translateX(calc(-100% - 12px));transition:transform .42s var(--spring);box-shadow:var(--sh3)}
  .side.open{transform:translateX(0)}
  .menu-float{display:flex}
}
@media(min-width:1280px){
  .side{width:clamp(300px,22vw,380px)}
  .msgs{padding-left:max(var(--pad),calc((100% - 840px)/2));padding-right:max(var(--pad),calc((100% - 840px)/2))}
  .comp-in{max-width:840px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<canvas id="c"></canvas><div class="fx"></div>
<div class="toast" id="toast"></div>
<div class="scrim" id="scrim"></div>
<button class="menu-float press" id="menuBtn"><svg class="i" viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
<div class="app">
  <aside class="side" id="side">
    <div class="side-h">
      <div class="logo">ticacode</div>
      <button class="ib press" id="th"><svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
    </div>
    <div class="lbl">Agents</div>
    <div class="list" id="list" role="listbox"></div>
    <div class="side-f">
      <button class="ib press" id="refreshBtn"><svg class="i" viewBox="0 0 24 24"><path d="M2 12a10 10 0 1 0 10-10"/><path d="M2 2v6h6"/></svg></button>
      <button class="ib press" id="langBtn" style="font-size:11px;font-weight:700">EN</button>
    </div>
  </aside>
  <div class="main" id="main">
    <div class="top" id="top" hidden>
      <div class="av" id="topAv">T</div>
      <div class="ti"><div class="n" id="topN">Agent</div><div class="s" id="topS">agent · isolated</div></div>
      <button class="ib press" id="closeBtn"><svg class="i" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="msgs" id="msgs">
      <div class="empty-state">Select an agent to start<br>isolated thread conversation</div>
    </div>
    <div class="comp" id="comp" hidden>
      <div class="comp-in">
        <div class="field"><textarea id="inp" placeholder="Message…" rows="1"></textarea></div>
        <button class="send" id="sendBtn" disabled><svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg></button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);
const S={agents:[],cur:null};
const MOCK_AGENTS=[
  {id:'seoul',name:'Seoul',type:'orchestrator',running:true,color:'[180,50,20]',desc:'Primary orchestrator · Hermes gateway'},
  {id:'cang',name:'Cang',type:'backend',running:true,color:'[212,168,83]',desc:'Production backend · ticalcode.com'},
  {id:'kael',name:'Kael',type:'worker',running:true,color:'[91,155,213]',desc:'Agent runner · eite-agent'},
  {id:'pro7',name:'Pro7',type:'worker',running:false,color:'[120,80,200]',desc:'Windows worker · MIMO/Grok'},
  {id:'tico',name:'Tico',type:'agent',running:true,color:'[52,199,89]',desc:'Telegram bridge · channel agent'},
  {id:'choi888',name:'Choi888',type:'agent',running:false,color:'[255,149,0]',desc:'MIMO Code runner'},
];

function esc(s){return String(s||'').replace(/[&<>"]/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]||m})}
function toast(txt){const e=$('toast');e.textContent=txt;e.classList.add('on');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('on'),2200)}
function theme(th){
  document.documentElement.setAttribute('data-theme',th);
  localStorage.setItem('tc_theme',th);
  const m=document.querySelector('meta[name=theme-color]');
  if(m)m.content=th==='dark'?'#050506':'#e8eaef';
}
theme(localStorage.getItem('tc_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));
$('th').onclick=()=>theme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

function closeSide(){$('side').classList.remove('open');$('scrim').classList.remove('on')}
function openSide(){$('side').classList.add('open');$('scrim').classList.add('on')}
$('menuBtn').onclick=openSide;
$('scrim').onclick=closeSide;

function renderList(){
  const list=$('list');
  list.innerHTML=S.agents.map(a=>{
    const id=esc(a.id),name=esc(a.name),type=esc(a.type);
    const active=S.cur&&String(S.cur.id)===String(a.id);
    const colors=(a.color||'[180,50,20]').replace(/[\[\]]/g,'');
    return `<button class="item press ${active?'active':''}" data-id="${id}" onclick="APP.openAgent('${id}',this)">
      <div class="av" style="background:radial-gradient(circle at 30% 30%,rgba(${colors},.6),rgba(${colors},.2))">${name[0].toUpperCase()}</div>
      <div class="meta"><div class="n">${name}</div><div class="s">${type}${a.running?' · live':''}</div></div>
      <div class="dot ${a.running?'on':''}"></div>
    </button>`;
  }).join('');
  if(!S.agents.length)list.innerHTML='<div style="padding:16px;color:var(--t2);font-size:13px;text-align:center">No agents</div>';
}

function showEmpty(){$('msgs').innerHTML='<div class="empty-state">Select an agent to start<br>isolated thread conversation</div>'}

function setThreadUI(on){
  $('top').hidden=!on;
  $('comp').hidden=!on;
  document.body.classList.toggle('has-thread',on);
}

function markActive(id){
  $('list').querySelectorAll('.item').forEach(el=>{
    const on=String(el.dataset.id||'')===String(id||'');
    el.classList.toggle('active',on);
  });
}

async function openAgent(id,btn){
  const agent=S.agents.find(a=>String(a.id)===String(id));
  if(!agent){toast('Agent not found');return}
  S.cur=agent;
  setThreadUI(true);
  markActive(id);
  closeSide();
  $('topAv').style.background=`radial-gradient(circle at 30% 30%,rgba(${(agent.color||'[180,50,20]').replace(/[\[\]]/g,'')},.6),rgba(${(agent.color||'[180,50,20]').replace(/[\[\]]/g,'')},.2))`;
  $('topAv').textContent=agent.name[0].toUpperCase();
  $('topN').textContent=agent.name;
  $('topS').textContent=(agent.running?'Live · ':'')+agent.type+' · isolated';
  $('inp').placeholder='Message '+agent.name+'…';
  $('inp').value='';$('inp').style.height='auto';
  $('sendBtn').disabled=false;
  $('msgs').innerHTML='<div class="empty-state" style="opacity:.6">Opened isolated thread with <strong>'+esc(agent.name)+'</strong><br>Type a message to start</div>';
  toast('Opened '+agent.name);
}

$('closeBtn').onclick=()=>{S.cur=null;setThreadUI(false);showEmpty();markActive('')};
$('sendBtn').onclick=async()=>{
  const inp=$('inp');const txt=inp.value.trim();
  if(!txt||!S.cur)return;
  const agent=S.cur;
  $('msgs').insertAdjacentHTML('beforeend',`<div class="msg-row me"><div class="bub">${esc(txt)}</div></div>`);
  inp.value='';inp.style.height='auto';$('sendBtn').disabled=true;
  $('msgs').scrollTop=$('msgs').scrollHeight;
  setTimeout(()=>{
    const replies={seoul:'Processing via Seoul orchestrator…',cang:'Routing through backend mesh…',kael:'Worker dispatched on Kael…',pro7:'Pro7 is offline — message queued',tico:'Forwarded to Telegram bridge',choi888:'Choi888 is offline — message queued'};
    const reply=replies[agent.id]||'Echo: '+txt+' (demo response)';
    $('msgs').insertAdjacentHTML('beforeend',`<div class="msg-row them"><div class="bub">${reply}</div></div>`);
    $('msgs').scrollTop=$('msgs').scrollHeight;
    $('sendBtn').disabled=false;
  },600+Math.random()*400);
};
$('inp').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('sendBtn').onclick()}};
$('inp').oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'};

/* Particle canvas (simplified) */
const c=$('c'),x=c.getContext('2d');
let W=0,H=0,dpr=1,p=[];
const PALETTE=[[255,255,255],[255,210,190],[212,168,83],[91,155,213]];
function resize(){
  dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  x.setTransform(dpr,0,0,dpr,0,0);
}
function seed(){
  const N=Math.min(120,Math.max(48,Math.floor(W*H/15000)));
  p=[];for(let i=0;i<N;i++){const a=Math.random()*Math.PI*2,s=.06+Math.random()*.2;
    p.push({x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:1.2+Math.random()*2.8,
      ph:Math.random()*Math.PI*2,hue:Math.floor(Math.random()*PALETTE.length)})}
}
function draw(now){
  x.clearRect(0,0,W,H);const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const pa=dark?PALETTE:[[50,36,32],[200,55,22],[170,120,40],[45,105,175]];
  const tt=now*0.001;
  for(let i=0;i<p.length;i++){
    const a=p[i];a.vx+=Math.sin(tt*0.5+a.ph)*.003;a.vy+=Math.cos(tt*0.4+a.ph)*.003;
    a.vx*=.99;a.vy*=.99;a.x+=a.vx;a.y+=a.vy;
    if(a.x<-10)a.x=W+10;if(a.x>W+10)a.x=-10;if(a.y<-10)a.y=H+10;if(a.y>H+10)a.y=-10;
    const rgb=pa[a.hue%pa.length];
    x.beginPath();x.arc(a.x,a.y,a.r,0,Math.PI*2);
    x.fillStyle=`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${.4+Math.sin(tt*a.ph)*.2})`;
    x.fill();
  }
  requestAnimationFrame(draw);
}
resize();seed();
addEventListener('resize',()=>{resize();seed()});
requestAnimationFrame(draw);

/* Boot */
S.agents=MOCK_AGENTS;
renderList();
if(matchMedia('(max-width:860px)').matches)setTimeout(openSide,280);
window.APP={openAgent};
})();
</script>
</body>
</html>
