<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kulono · cosmic maze</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#020208;color:#f5f5f7;font-family:-apple-system,system-ui,sans-serif}
body{position:fixed;inset:0}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%}
#load{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:#020208;color:#98989d;font-size:14px;transition:opacity .8s}
#load.hide{opacity:0;pointer-events:none}
#hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;padding:8px 18px;border-radius:999px;background:rgba(18,14,16,.72);backdrop-filter:blur(22px);border:.5px solid rgba(255,255,255,.08);font-size:13px;display:flex;align-items:center;gap:10px;transition:opacity .4s;white-space:nowrap}
#hud .l{font-weight:700;background:linear-gradient(115deg,#fff5eb,#e07040,#e0b060,#f0d090);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#ins{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;padding:10px 20px;border-radius:999px;background:rgba(18,14,16,.72);backdrop-filter:blur(22px);border:.5px solid rgba(255,255,255,.08);font-size:13px;color:#98989d;transition:opacity .4s;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="load"><span>Loading…</span></div>
<div id="hud"><span class="l">KULONO</span><span style="width:1px;height:16px;background:rgba(255,255,255,.08)"></span><span>cosmic maze</span></div>
<div id="ins">✦ Drag/scroll to explore</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if(typeof THREE==='undefined'){
  document.getElementById('load').innerHTML='<div style="color:#ff3b30;font-size:28px">&#9888;</div><div style="font-size:15px;font-weight:500">Failed to load 3D engine</div>';
  throw new Error('THREE not loaded');
}
document.getElementById('load').classList.add('hide');

// === OrbitControls ===
THREE.OrbitControls=function(cam,el){
  var s=this,st=THREE.NONE;
  this.target=new THREE.Vector3();
  this.minDistance=1;this.maxDistance=80;this.maxPolarAngle=Math.PI/2.05;
  this.enabled=true;
  var lx,ly;
  function mm(e){
    if(!s.enabled||st!==THREE.ROTATE)return;
    var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
    var o=new THREE.Vector3().copy(cam.position).sub(s.target);
    var sp=new THREE.Spherical().setFromVector3(o);
    sp.theta-=dx*.005;sp.phi-=dy*.005;
    sp.phi=Math.max(.05,Math.min(s.maxPolarAngle,sp.phi));
    cam.position.copy(s.target).add(new THREE.Vector3().setFromSpherical(sp));
    cam.lookAt(s.target);
  }
  el.addEventListener('mousedown',function(e){e.preventDefault();st=THREE.ROTATE;lx=e.clientX;ly=e.clientY});
  el.addEventListener('mousemove',mm);
  el.addEventListener('mouseup',function(){st=THREE.NONE});
  el.addEventListener('mouseleave',function(){st=THREE.NONE});
  el.addEventListener('wheel',function(e){e.preventDefault();
    if(!s.enabled||!e.deltaY)return;
    var d=cam.position.distanceTo(s.target);
    var f=e.deltaY>0?1.1:.9;
    var nd=d*f;
    if(nd<s.minDistance||nd>s.maxDistance)return;
    cam.position.sub(s.target).multiplyScalar(f).add(s.target);
    cam.lookAt(s.target);
  },{passive:false});
  el.addEventListener('contextmenu',function(e){e.preventDefault()});
  this.update=function(){cam.lookAt(s.target)};
  this.update();
};

// === Renderer ===
var c=document.getElementById('c');
var renderer=new THREE.WebGLRenderer({canvas:c,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);
camera.position.set(0,5,14);

var controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(0,0.5,0);

// Lights
scene.add(new THREE.AmbientLight(0x404060,0.8));
var dl=new THREE.DirectionalLight(0xffffff,2.0);
dl.position.set(-5,12,-3);
scene.add(dl);
scene.add(new THREE.DirectionalLight(0xffaa88,1.2).position.set(6,2,8));

// Grid
var gridHelper=new THREE.GridHelper(20,20,0x4466aa,0x334488);
gridHelper.position.y=-0.5;
scene.add(gridHelper);

// Stars
(function(){
  var N=2000,pos=new Float32Array(N*3);
  for(var i=0;i<N;i++){
    var r=30+Math.random()*80,th=Math.random()*6.2832,ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.cos(ph);
    pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
  }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({color:0x8899cc,size:.3,sizeAttenuation:true})));
})();

// === MAZE ===
function genMaze(cols,rows){
  var g=[];
  for(var y=0;y<rows;y++){g[y]=[];for(var x=0;x<cols;x++)g[y][x]={x:x,y:y,vis:0,n:1,s:1,e:1,w:1}}
  var stack=[],cur=g[0][0];cur.vis=1;
  while(true){
    var next=[];
    if(cur.y>0&&!g[cur.y-1][cur.x].vis)next.push({y:cur.y-1,x:cur.x,w:'n',o:'s'});
    if(cur.y<rows-1&&!g[cur.y+1][cur.x].vis)next.push({y:cur.y+1,x:cur.x,w:'s',o:'n'});
    if(cur.x<cols-1&&!g[cur.y][cur.x+1].vis)next.push({y:cur.y,x:cur.x+1,w:'e',o:'w'});
    if(cur.x>0&&!g[cur.y][cur.x-1].vis)next.push({y:cur.y,x:cur.x-1,w:'w',o:'e'});
    if(next.length){
      var n=next[Math.floor(Math.random()*next.length)];
      cur[n.w]=0;g[n.y][n.x][n.o]=0;g[n.y][n.x].vis=1;
      stack.push(cur);cur=g[n.y][n.x];
    }else if(stack.length){cur=stack.pop()}else break;
  }
  return g;
}

// Build a single test maze
var cols=7,rows=7,cs=0.9,wh=1.4,wt=0.12;
var grid=genMaze(cols,rows);
var mazeGroup=new THREE.Group();
var wallMat=new THREE.MeshStandardMaterial({color:0xd4461a,roughness:.5,metalness:.3});
// Add floor
var floorMat=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.7,side:THREE.DoubleSide,transparent:true,opacity:.35});
var floorPlane=new THREE.Mesh(new THREE.PlaneGeometry(cols*cs,rows*cs),floorMat);
floorPlane.rotation.x=-Math.PI/2;
floorPlane.position.y=-wh/2;
mazeGroup.add(floorPlane);

// Add walls
for(var y=0;y<rows;y++){
  for(var x=0;x<cols;x++){
    var cell=grid[y][x];
    var px=(x-(cols-1)/2)*cs,pz=(y-(rows-1)/2)*cs;
    if(cell.n){var w=new THREE.Mesh(new THREE.BoxGeometry(cs,wh,wt),wallMat);w.position.set(px,0,pz-cs/2);mazeGroup.add(w)}
    if(cell.s){var w=new THREE.Mesh(new THREE.BoxGeometry(cs,wh,wt),wallMat);w.position.set(px,0,pz+cs/2);mazeGroup.add(w)}
    if(cell.e){var w=new THREE.Mesh(new THREE.BoxGeometry(wt,wh,cs),wallMat);w.position.set(px+cs/2,0,pz);mazeGroup.add(w)}
    if(cell.w){var w=new THREE.Mesh(new THREE.BoxGeometry(wt,wh,cs),wallMat);w.position.set(px-cs/2,0,pz);mazeGroup.add(w)}
  }
}

mazeGroup.position.set(0,0.5,0);
scene.add(mazeGroup);
console.log('Maze added, children:',mazeGroup.children.length);

// Animation
(function anim(t){
  requestAnimationFrame(anim);
  mazeGroup.rotation.y+=.002;
  controls.update();
  renderer.render(scene,camera);
})();

addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
